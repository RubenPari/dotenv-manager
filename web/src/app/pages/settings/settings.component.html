<div class="mx-auto max-w-2xl space-y-6">
  <h1 class="text-2xl font-semibold tracking-tight text-fg">Settings</h1>

  <ui-card [padded]="true" [hoverable]="false" [gradientBorder]="false">
    <h2 class="text-sm font-medium text-fg">Account</h2>
    <p class="mb-2 mt-1 text-sm text-fg-muted">Session email used for the API and dashboard.</p>
    <p class="rounded-md border border-border/60 bg-surface px-3 py-2 font-mono text-sm text-fg">
      {{ currentUser()?.email || '—' }}
    </p>
  </ui-card>

  <ui-card [padded]="true" [hoverable]="false" [gradientBorder]="false">
    <h2 class="text-sm font-medium text-fg">Appearance</h2>
    <p class="mb-3 mt-1 text-sm text-fg-muted">System matches your OS until you choose light or dark.</p>
    <ui-theme-toggle />
  </ui-card>

  <ui-card [padded]="true" [hoverable]="false" [gradientBorder]="false">
    <h2 class="text-sm font-medium text-fg">API</h2>
    <p class="mt-1 break-all font-mono text-sm text-fg">Base URL: {{ apiBaseUrl }}</p>
  </ui-card>

  <ui-card [padded]="true" [hoverable]="false" [gradientBorder]="false">
    <h2 class="text-sm font-medium text-fg">Session</h2>
    <p class="mb-4 text-sm text-fg-muted">Your access token is stored in this browser.</p>
    <ui-button variant="danger" (click)="logout()">Sign out</ui-button>
  </ui-card>
</div>
