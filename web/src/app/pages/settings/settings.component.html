<div class="min-h-screen bg-gray-50">
  <nav class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a routerLink="/dashboard" class="text-gray-600 hover:text-gray-900"
            >&larr; Back to Dashboard</a
          >
        </div>
        <div class="flex items-center gap-4">
          <button (click)="logout()" class="text-red-600 hover:text-red-700">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Settings</h1>

    <div class="bg-white rounded-lg shadow-md p-6 space-y-6">
      <div>
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Account</h2>
        <p class="text-gray-600">Manage your account settings and preferences.</p>
      </div>

      <div class="border-t border-gray-200 pt-6">
        <h3 class="text-sm font-medium text-gray-700 mb-2">Session</h3>
        <p class="text-sm text-gray-500 mb-4">
          You are currently logged in. Your session token is stored locally.
        </p>
        <button
          (click)="logout()"
          class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700 transition-colors"
        >
          Sign Out
        </button>
      </div>

      <div class="border-t border-gray-200 pt-6">
        <h3 class="text-sm font-medium text-gray-700 mb-2">API Connection</h3>
        <p class="text-sm text-gray-500">
          Connected to: <code class="bg-gray-100 px-2 py-0.5 rounded">{{ apiBaseUrl }}</code>
        </p>
      </div>
    </div>
  </main>
</div>
